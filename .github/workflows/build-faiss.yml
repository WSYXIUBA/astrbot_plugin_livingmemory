name: Build faiss-cpu (generic / no AVX2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout faiss-wheels
        uses: actions/checkout@v4
        with:
          repository: kyamagu/faiss-wheels
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build faiss-cpu wheel (generic only)
        run: |
          FAISS_ENABLE_GPU=OFF \
          FAISS_OPT_LEVELS=generic \
          pip wheel . -w dist/ --no-build-isolation --no-deps

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-cpu-generic-py${{ matrix.python-version }}-linux-x86_64
          path: dist/*.whl
