name: Build faiss-cpu (generic / no AVX2, static OpenBLAS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout faiss-wheels
        uses: actions/checkout@v4
        with:
          repository: kyamagu/faiss-wheels
          submodules: recursive

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libopenblas-dev

      - name: Install Python build tools
        run: pip install build

      - name: Build faiss-cpu wheel (generic, static OpenBLAS)
        env:
          FAISS_OPT_LEVELS: generic
          FAISS_GPU_SUPPORT: "OFF"
        run: |
          python -m build --wheel -o dist/ \
            -Ccmake.define.BLA_STATIC=ON \
            -Ccmake.define.BLA_VENDOR=OpenBLAS

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: faiss-cpu-generic-py${{ matrix.python-version }}-linux-x86_64
          path: dist/*.whl
